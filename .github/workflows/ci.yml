name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_WORK_DIR: backend

jobs:
  # ─── Go: vet, test, build ────────────────────────────────────────────────────
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -count=1 -timeout 120s ./...

      - name: Build all commands
        run: |
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/gateway/
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/meetings/
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/audio/

  # ─── SAM: validate + build ───────────────────────────────────────────────────
  sam:
    name: SAM Validate & Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: SAM validate
        run: sam validate --lint --template deployments/template.yaml

      - name: SAM build
        run: |
          sam build \
            --template deployments/template.yaml \
            --build-dir .aws-sam/build \
            --use-container \
            --container-env-var GOOS=linux \
            --container-env-var GOARCH=arm64
        env:
          # SAM build container needs these; AWS creds are NOT required for build
          GOOS: linux
          GOARCH: arm64

  # ─── Lint (golangci-lint) ────────────────────────────────────────────────────
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: --timeout 5m
