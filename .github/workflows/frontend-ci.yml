name: Frontend CI

on:
  pull_request:
    paths:
      - '.github/workflows/frontend-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'public/**'
      - 'vite*.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'seo-prerender.cjs'
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/frontend-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'public/**'
      - 'vite*.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'seo-prerender.cjs'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Test, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
