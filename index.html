<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>Lira · Conversational Intelligence Platform</title>
    <meta name="title" content="Lira · Conversational Intelligence Platform" />
    <meta
      name="description"
      content="Lira is a Conversational Intelligence platform. One AI agent that handles customer support, coaches sales calls, and runs meetings, grounded in your knowledge and responding in real time."
    />
    <meta
      name="keywords"
      content="conversational intelligence platform, AI customer support agent, AI support automation, real-time sales coaching AI, AI meeting assistant, voice AI agent, knowledge-grounded AI, conversational AI for SaaS, AI agent grounded in knowledge base, Amazon Nova Sonic, Lira AI, Lira Intelligence"
    />
    <meta name="author" content="Lira Intelligence" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="canonical" href="https://liraintelligence.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://liraintelligence.com/" />
    <meta property="og:title" content="Lira · Conversational Intelligence Platform" />
    <meta
      property="og:description"
      content="One AI agent across customer support, sales calls, and meetings. Grounded in your knowledge. Lira doesn't just listen, it responds and resolves."
    />
    <meta
      property="og:image"
      content="https://liraintelligence.com/lira_black_with_white_backgound.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Lira" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://liraintelligence.com/" />
    <meta name="twitter:title" content="Lira · Conversational Intelligence Platform" />
    <meta
      name="twitter:description"
      content="One AI agent across customer support, sales calls, and meetings. Grounded in your knowledge."
    />
    <meta
      name="twitter:image"
      content="https://liraintelligence.com/lira_black_with_white_backgound.png"
    />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/lira_black_with_white_backgound.png" />
    <link rel="apple-touch-icon" href="/lira_black_with_white_backgound.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Lira",
        "alternateName": "Lira Intelligence",
        "url": "https://liraintelligence.com",
        "logo": "https://liraintelligence.com/lira_black_with_white_backgound.png",
        "description": "Lira is a Conversational Intelligence platform. One AI agent that handles customer support, coaches sales calls, and runs meetings, grounded in your knowledge.",
        "foundingDate": "2026",
        "sameAs": [],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "lira@liraintelligence.com"
        }
      }
    </script>

    <!-- JSON-LD Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Lira",
        "applicationCategory": "BusinessApplication",
        "applicationSubCategory": "Conversational Intelligence Platform",
        "operatingSystem": "Web",
        "description": "Conversational Intelligence platform with one AI agent across customer support, sales calls, and meetings, grounded in your organization's knowledge.",
        "url": "https://liraintelligence.com",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free early access"
        },
        "featureList": [
          "AI customer support agent (chat, portal, email)",
          "Knowledge-grounded responses with RAG",
          "Autonomous ticket resolution",
          "Real-time sales coaching with objection detection",
          "CRM auto-fill for Salesforce and HubSpot",
          "AI meeting participant with live action execution",
          "Post-call summaries and action items",
          "Tool use: create tickets, update CRM, send follow-ups",
          "Organization-wide knowledge base with semantic search",
          "Webhook, Slack, Linear, Jira, Zendesk integrations",
          "Built on Amazon Nova Sonic and Nova Lite"
        ],
        "screenshot": "https://liraintelligence.com/lira_black_with_white_backgound.png"
      }
    </script>

    <!-- JSON-LD Structured Data: WebSite (enables Google sitelinks search) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Lira",
        "url": "https://liraintelligence.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://liraintelligence.com/blog?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
