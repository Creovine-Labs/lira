<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>Lira</title>
    <meta name="title" content="Lira" />
    <meta
      name="description"
      content="Lira AI is an intelligent meeting participant that joins your calls in real time. Automate sales coaching, first-round interviews, customer support, and meeting transcription with AI-powered voice agents. Built on Amazon Nova Sonic."
    />
    <meta
      name="keywords"
      content="AI meeting assistant, AI meeting participant, AI sales coaching, AI interview automation, AI customer support, real-time transcription, meeting intelligence, voice AI agent, sales call coaching, objection handling AI, AI hiring tool, automated interviews, customer support AI, knowledge base AI, AI notetaker, meeting transcription, deal coaching, battle cards AI, CRM auto-fill, competency scoring, candidate evaluation, AI voice agent, meeting recording, action item extraction, Amazon Nova Sonic, Lira AI, Lira Intelligence"
    />
    <meta name="author" content="Lira Intelligence" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="canonical" href="https://liraintelligence.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://liraintelligence.com/" />
    <meta property="og:title" content="Lira" />
    <meta
      property="og:description"
      content="AI-powered meeting participant for sales coaching, automated interviews, customer support, and real-time transcription. Lira joins your calls, listens, and acts."
    />
    <meta
      property="og:image"
      content="https://liraintelligence.com/lira_black_with_white_backgound.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Lira" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://liraintelligence.com/" />
    <meta name="twitter:title" content="Lira" />
    <meta
      name="twitter:description"
      content="AI-powered meeting participant for sales coaching, automated interviews, customer support, and real-time transcription."
    />
    <meta
      name="twitter:image"
      content="https://liraintelligence.com/lira_black_with_white_backgound.png"
    />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/lira_black_with_white_backgound.png" />
    <link rel="apple-touch-icon" href="/lira_black_with_white_backgound.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Lira",
        "alternateName": "Lira Intelligence",
        "url": "https://liraintelligence.com",
        "logo": "https://liraintelligence.com/lira_black_with_white_backgound.png",
        "description": "Lira AI is an intelligent AI meeting participant that automates sales coaching, hiring interviews, customer support, and meeting transcription using voice AI.",
        "foundingDate": "2026",
        "sameAs": [],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "lira@liraintelligence.com"
        }
      }
    </script>

    <!-- JSON-LD Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Lira",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "AI meeting participant that joins calls in real time for sales coaching, automated interviews, customer support, and meeting transcription.",
        "url": "https://liraintelligence.com",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free beta access"
        },
        "featureList": [
          "Real-time meeting transcription",
          "AI sales coaching with objection detection",
          "Battle card suggestions for competitive selling",
          "CRM auto-fill for Salesforce and HubSpot",
          "Automated first-round interviews",
          "Competency scoring and candidate ranking",
          "AI customer support voice agent",
          "Knowledge base grounding",
          "Smart escalation to human agents",
          "Post-call summaries and action items",
          "Organization knowledge base with semantic search",
          "Document upload and RAG pipeline",
          "Task extraction and execution",
          "Webhook and Slack notifications",
          "Google Meet integration",
          "Linear, GitHub, Greenhouse integrations"
        ],
        "screenshot": "https://liraintelligence.com/lira_black_with_white_backgound.png"
      }
    </script>

    <!-- JSON-LD Structured Data: WebSite (enables Google sitelinks search) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Lira",
        "url": "https://liraintelligence.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://liraintelligence.com/blog?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
